<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Forzar no-caché agresivo -->
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />
    
    <title>RE/MAX DOCTA - Dashboard v19.04.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        :root { --remax-red: #E11B22; --remax-blue: #003DA5; }
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; color: #1e293b; }
        .remax-gradient { background: linear-gradient(135deg, #003DA5 0%, #001a4d 100%); }
        .filter-btn.active { background-color: var(--remax-red); color: white; border-color: var(--remax-red); box-shadow: 0 4px 12px rgba(225, 27, 34, 0.3); }
        .card-entry { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .card-entry:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1); border-color: var(--remax-blue); }
    </style>
</head>
<body class="pb-20">

    <header class="remax-gradient text-white py-8 px-4 mb-8 shadow-xl relative overflow-hidden">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
            <div class="flex items-center gap-6">
                <div class="bg-white p-3 rounded-2xl shadow-lg">
                    <img src="https://storage.googleapis.com/artifacts-api-images/2f8477d2-e3c6-462a-aadb-af378c9d2365" alt="Logo" class="h-14 w-auto">
                </div>
                <div>
                    <h1 class="text-3xl font-black uppercase italic tracking-tighter leading-none">Inteligencia Comercial</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                        <p class="text-blue-200 text-[10px] font-bold uppercase tracking-widest">Última carga: 19 de Abril (Hoy)</p>
                    </div>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <div class="bg-red-600 px-4 py-1 rounded-full mb-2">
                    <p class="text-[10px] font-black uppercase tracking-widest italic text-white">Versión 19.04.2</p>
                </div>
                <p class="text-2xl font-black italic tracking-tighter uppercase">RE/MAX DOCTA</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4">
        <!-- Alerta de actualización -->
        <div class="bg-white border border-slate-200 p-4 mb-10 rounded-2xl flex items-center gap-4 shadow-sm">
            <div class="bg-blue-600 text-white p-3 rounded-xl">
                <i class="fas fa-sync-alt"></i>
            </div>
            <div>
                <p class="text-sm text-slate-800 font-bold italic">Panel de Demanda Actualizado</p>
                <p class="text-[11px] text-slate-500 uppercase font-bold">Resumen de pedidos auditados del chat RE/MAX Córdoba Oficial</p>
            </div>
        </div>

        <!-- Filtros -->
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-10">
            <div class="flex flex-col lg:flex-row gap-6 items-center">
                <div class="w-full lg:flex-1 relative">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" placeholder="Buscar barrio, monto, agente o prioridad..." class="w-full pl-14 pr-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium" onkeyup="filterCards()">
                </div>
                <div class="w-full lg:w-auto flex gap-2 overflow-x-auto pb-2">
                    <button onclick="filterType('todos')" class="filter-btn active px-6 py-3 rounded-2xl text-[10px] font-black border border-slate-200 transition-all uppercase">Todos</button>
                    <button onclick="filterType('Depto')" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-[10px] font-black border border-slate-200 transition-all uppercase">Deptos</button>
                    <button onclick="filterType('Casa')" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-[10px] font-black border border-slate-200 transition-all uppercase">Casas</button>
                    <button onclick="filterType('Alquiler')" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-[10px] font-black border border-slate-200 transition-all uppercase">Alquileres</button>
                </div>
            </div>
        </section>

        <!-- Grid -->
        <div id="requestsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        <div id="noResults" class="hidden text-center py-20 italic font-bold text-slate-400">Sin resultados</div>
    </main>

    <script>
        // Versión ID para forzar refresco: 202604192305
        const requests = [
            { cat: "Casa 2D", zona: "Río Ceballos", desc: "2 dorm o 1 dorm + escritorio. Sin pileta. Presupuesto 60-70k.", nombre: "+54 9 351 224-3714", tel: "5493512243714", fecha: "19/04", prio: "⭐⭐⭐ URGENTE", quote: "u$s 70.000", raw: "Búsqueda casa en río Ceballos. Presupuesto 60 máximo 70." },
            { cat: "Depto", zona: "Mariano Fragueiro", desc: "Busca departamentos específicamente en esta calle.", nombre: "+54 9 351 301-3086", tel: "5493513013086", fecha: "19/04", prio: "⭐⭐ NUEVO", quote: "Consultar", raw: "Quien tiene dptos acá en la Mariano Fragueiro?" },
            { cat: "Depto 2D", zona: "General Paz", desc: "2 dorm, 2 baños. APTO CRÉDITO con escritura y planos.", nombre: "Valentin Minguez", tel: "5493512345678", fecha: "15/04", prio: "⭐⭐⭐ APTO CRÉDITO", quote: "u$s 120.000", raw: "BÚSQUEDA - gral paz - 120.000 usd - 2 D - 2 baños" },
            { cat: "Alquiler Depto", zona: "Gral Paz / Cofico", desc: "1 o 2 dormitorios. Inquilino filtrado.", nombre: "Gabriela Vega", tel: "5493512345680", fecha: "15/04", prio: "⭐⭐ URGENTE", quote: "Consultar", raw: "Buqueda Urgente inquilino busca depto" },
            { cat: "Casa 3D", zona: "Barrio Cerrado ZN", desc: "3 dorm en barrio cerrado. Apto Crédito Nación.", nombre: "Jesica Vélez", tel: "5493512345679", fecha: "15/04", prio: "⭐⭐⭐ CRÉDITO NACIÓN", quote: "u$s 150.000", raw: "estoy buscando comprar una casa en barrio cerrado" },
            { cat: "Depto 2D", zona: "Alberdi / Cofico / Gral Paz", desc: "2 dormitorios. Requisito Apto Crédito.", nombre: "Aldana Ludueña", tel: "5493516629988", fecha: "13/04", prio: "⭐⭐⭐ APTO CRÉDITO", quote: "u$s 90.000", raw: "Busqueda: departamento en alberdi/cofico/gral paz" },
            { cat: "Depto 1D", zona: "Cofico / Alta Cba", desc: "PLATA EN MANO. Inversión rápida.", nombre: "Daniela Asesora", tel: "5493513292415", fecha: "10/04", prio: "⭐⭐⭐ EFECTIVO", quote: "u$s 52.000", raw: "PLATA EN MANO, CLIENTE FILTRADO" },
            { cat: "Casa 3D", zona: "Sierras Chicas", desc: "Reserva caída. Compra inmediata.", nombre: "+54 9 351 346-2754", tel: "5493513462754", fecha: "08/04", prio: "⭐⭐⭐ PRIORIDAD", quote: "u$s 130.000", raw: "para comprar ya por reserva caída" }
        ];

        function renderCards(data) {
            const grid = document.getElementById('requestsGrid');
            grid.innerHTML = '';
            if (data.length === 0) { document.getElementById('noResults').classList.remove('hidden'); return; }
            document.getElementById('noResults').classList.add('hidden');

            data.forEach(item => {
                const isUrgent = item.prio.includes("⭐⭐⭐") || item.prio.includes("URGENTE");
                const card = document.createElement('div');
                card.className = "card-entry bg-white rounded-[2rem] p-6 flex flex-col shadow-sm";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-5">
                        <span class="text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border ${isUrgent ? 'bg-red-50 text-red-600 border-red-100' : 'bg-blue-50 text-blue-600 border-blue-100'}">${item.prio}</span>
                        <span class="text-[11px] text-slate-400 font-bold italic">${item.fecha}</span>
                    </div>
                    <div class="mb-4">
                        <h4 class="text-[10px] font-black text-red-600 uppercase tracking-tighter mb-1">${item.cat}</h4>
                        <h3 class="text-xl font-bold text-slate-900 leading-tight">${item.zona}</h3>
                    </div>
                    <p class="text-slate-600 italic text-sm mb-6 flex-1">"${item.desc}"</p>
                    <div class="bg-blue-50/50 border border-blue-100 p-4 rounded-2xl mb-6 flex items-center justify-between">
                        <span class="text-[10px] font-black text-blue-900 uppercase">Presupuesto</span>
                        <span class="text-[12px] font-black text-blue-900 uppercase tracking-tight">${item.quote}</span>
                    </div>
                    <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                        <div class="overflow-hidden">
                            <span class="text-[9px] text-slate-400 font-bold uppercase block">Contacto</span>
                            <span class="text-[11px] font-bold text-slate-800 truncate block">${item.nombre}</span>
                        </div>
                        <a href="https://wa.me/${item.tel}" target="_blank" class="bg-green-500 text-white p-2.5 rounded-xl hover:bg-green-600 shadow-md">
                            <i class="fab fa-whatsapp"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        let currentFilter = 'todos';
        function filterCards() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = requests.filter(r => {
                const matchQ = (r.zona + r.desc + r.nombre + r.cat).toLowerCase().includes(q);
                const matchT = currentFilter === 'todos' || r.cat.toLowerCase().includes(currentFilter.toLowerCase());
                return matchQ && matchT;
            });
            renderCards(filtered);
        }

        function filterType(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            filterCards();
        }

        window.onload = () => renderCards(requests);
    </script>
</body>
</html>
