<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE/MAX DOCTA - Inteligencia Comercial Completa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --remax-red: #E11B22;
            --remax-blue: #003DA5;
        }
        body {
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }
        .remax-gradient {
            background: linear-gradient(135deg, #003DA5 0%, #002157 100%);
        }
        .filter-btn.active {
            background-color: var(--remax-red);
            color: white;
            border-color: var(--remax-red);
        }
        .text-pedido {
            font-size: 0.95rem; /* +20% sobre el estándar */
            line-height: 1.6;
        }
        .text-fecha {
            font-size: 0.75rem; /* +20% sobre el estándar */
        }
        .card-entry {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-entry:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .wa-disabled {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="remax-gradient text-white py-8 px-4 mb-8 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-6">
                <img src="https://storage.googleapis.com/artifacts-api-images/6c783da6-d9ff-4b16-9725-264ebc4db48b" 
                     alt="RE/MAX Docta" 
                     class="h-20 w-auto object-contain">
                <div class="h-14 w-px bg-white/20 hidden md:block"></div>
                <div>
                    <h1 class="text-2xl md:text-4xl font-black tracking-tighter uppercase italic">Inteligencia Comercial</h1>
                    <p class="text-blue-200 text-sm font-medium tracking-wide">Base de Pedidos Unificada (Abril 2026)</p>
                </div>
            </div>
            <div class="bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/20 text-center md:text-right">
                <p class="text-xs text-blue-100 uppercase font-black tracking-widest mb-1">Agencia Córdoba</p>
                <p class="text-2xl font-bold italic">RE/MAX DOCTA</p>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4">
        
        <!-- BUSCADOR -->
        <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-10">
            <div class="flex flex-col lg:flex-row gap-6 items-center">
                <div class="w-full lg:flex-1 relative">
                    <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="searchInput" 
                        placeholder="Buscar por barrio (Ej: Manantiales, Docta, Centro), Agente o Presupuesto..." 
                        class="w-full pl-14 pr-6 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all font-medium"
                        onkeyup="filterCards()">
                </div>
                <div class="w-full lg:w-auto flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    <button onclick="filterType('todos', event)" class="filter-btn active px-6 py-3 rounded-2xl text-xs font-black border border-slate-200 transition-all whitespace-nowrap uppercase">Todos</button>
                    <button onclick="filterType('Depto', event)" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-xs font-black border border-slate-200 transition-all whitespace-nowrap uppercase">Deptos</button>
                    <button onclick="filterType('Casa', event)" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-xs font-black border border-slate-200 transition-all whitespace-nowrap uppercase">Casas</button>
                    <button onclick="filterType('Lote', event)" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-xs font-black border border-slate-200 transition-all whitespace-nowrap uppercase">Lotes</button>
                    <button onclick="filterType('Comercial', event)" class="filter-btn bg-white text-slate-600 px-6 py-3 rounded-2xl text-xs font-black border border-slate-200 transition-all whitespace-nowrap uppercase">Comercial</button>
                </div>
            </div>
        </section>

        <!-- GRID DE PEDIDOS COMPLETO -->
        <div id="requestsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Render dinámico de 25+ pedidos -->
        </div>

        <div id="noResults" class="hidden text-center py-20">
            <i class="fas fa-search text-5xl text-slate-300 mb-4"></i>
            <h3 class="text-xl font-bold text-slate-800">Sin resultados para esa búsqueda</h3>
        </div>
    </main>

    <script>
        const requests = [
            // DEPARTAMENTOS
            { cat: "Depto", zona: "Norte (Alta Cba / Cofico)", desc: "1 dorm, max 10 años, pileta. Firma próxima semana.", nombre: "+54 9 351 873-3771", tel: "5493518733771", fecha: "01/04", prio: "⭐⭐⭐ EFECTIVO", quote: "u$s 62.000" },
            { cat: "Depto", zona: "Gral Paz", desc: "Buen estado, acepta permuta vehículo nuevo + efectivo.", nombre: "+54 9 351 819-2805", tel: "5493518192805", fecha: "01/04", prio: "⭐⭐ PERMUTA", quote: "USD 75.000" },
            { cat: "Depto 1D", zona: "Milenica / Harmonie", desc: "Complejo cerrado zona norte, 1 dorm. Hasta 120k.", nombre: "+54 9 351 811-6415", tel: "5493518116415", fecha: "08/04", prio: "⭐⭐ LENDAR", quote: "USD 120.000" },
            { cat: "Depto 1D", zona: "Gral Paz / Alberdi", desc: "PLATA EN MANO. Inversión, escritura, gas nat. Filtrado.", nombre: "Daniela Asesora", tel: "5493513292415", fecha: "10/04", prio: "⭐⭐⭐ EFECTIVO", quote: "USD 52.000" },
            { cat: "Depto 1D", zona: "Cofico / Alta Cba", desc: "Comprar ya! Bien ubicado, poca antigüedad.", nombre: "+54 9 351 606-5358", tel: "5493516065358", fecha: "08/04", prio: "⭐ URGENTE", quote: "USD 50.000" },
            { cat: "Depto 2D", zona: "Gral Paz / Z. Norte", desc: "Calidad, cochera, piso 7+, orient. SUR. Inversor premium.", nombre: "Martin Trejo", tel: "5493515510657", fecha: "11/04", prio: "⭐⭐⭐ CONTADO", quote: "USD 180.000" },
            { cat: "Depto 3D", zona: "Centro / Nva Cba", desc: "Seguridad 24hs. Cierre contado inmediato.", nombre: "Mariana Roschietti", tel: "5493516182101", fecha: "08/04", prio: "⭐⭐⭐ CONTADO", quote: "USD 190.000" },
            { cat: "Depto 1D/2D", zona: "Alto Villasol / Gama", desc: "Complejo cerrado con seguridad, acceso Intercountry.", nombre: "+54 9 351 669-1729", tel: "5493516691729", fecha: "13/04", prio: "⭐ ESTÁNDAR", quote: "Consultar" },
            { cat: "Depto 1D", zona: "Nueva Córdoba", desc: "Frente o externo, buena luz. Para estudiante.", nombre: "+54 9 351 303-3465", tel: "5493513033465", fecha: "05/04", prio: "⭐⭐ CALIFICADO", quote: "USD 65.000" },

            // CASAS
            { cat: "Casa", zona: "V. Belgrano / Urca", desc: "Cocina con isla, galería, cochera, escritura.", nombre: "Ana Ruffa", tel: "5493512362544", fecha: "06/04", prio: "⭐⭐ CALIFICADO", quote: "USD 160.000" },
            { cat: "Casa 3D", zona: "Río Ceballos / Unquillo", desc: "RESERVA CAÍDA. Dinero disponible ya. 3 dorm + pileta.", nombre: "+54 9 351 346-2754", tel: "5493513462754", fecha: "08/04", prio: "⭐⭐⭐ URGENTE", quote: "USD 130.000" },
            { cat: "Casa 2D", zona: "Alto Alberdi / Obrero", desc: "DESOCUPADA EXCLUYENTE. Mudanza inmediata.", nombre: "Axel Gadau", tel: "5493513028213", fecha: "11/04", prio: "⭐⭐⭐ URGENTE", quote: "USD 60.000" },
            { cat: "Casa", zona: "Manantiales", desc: "3 dorm, suite, radiadores, cochera doble.", nombre: "Flor Montoya", tel: "5493513251261", fecha: "02/04", prio: "⭐⭐ CALIFICADO", quote: "USD 200.000" },
            { cat: "Casa", zona: "Escobar / B. Palermo", desc: "3 dorm, apto crédito NACIÓN.", nombre: "Lorena Ariza", tel: "5493512255757", fecha: "07/04", prio: "⭐⭐ CRÉDITO", quote: "USD 72.000" },
            { cat: "Casa", zona: "Mendiolaza / Unquillo", desc: "Terreno grande, entorno verde. 3 dorm.", nombre: "+54 9 351 531-1582", tel: "5493515311582", fecha: "04/04", prio: "⭐ ESTÁNDAR", quote: "USD 115.000" },
            { cat: "Casa Reciclar", zona: "Alto Verde / Urca", desc: "Propiedad para reciclar o terreno para 2 unidades.", nombre: "C. Manzano", tel: "5493516518105", fecha: "08/04", prio: "⭐ INVERSOR", quote: "USD 100.000" },
            { cat: "Dúplex", zona: "Manantiales II", desc: "A estrenar o en pozo avanzado. 3 dorm.", nombre: "Juan P. Docta", tel: "5493516543210", fecha: "09/04", prio: "⭐⭐ CALIFICADO", quote: "USD 145.000" },

            // LOTES Y TERRENOS
            { cat: "Lote", zona: "Villa Warcalde", desc: "500-600 m2, PLANO requisito excluyente.", nombre: "+54 9 351 258-1359", tel: "5493512581359", fecha: "07/04", prio: "⭐⭐ CALIFICADO", quote: "USD 180.000" },
            { cat: "Terreno", zona: "Icho Cruz / San Antonio", desc: "Entorno natural, cerca del río.", nombre: "Guido Docta", tel: "5493517610000", fecha: "06/04", prio: "⭐ ESTÁNDAR", quote: "USD 20.000" },
            { cat: "Lote", zona: "Docta (Etapa 1 o 2)", desc: "Apto dúplex, con posesión.", nombre: "+54 9 351 688-4422", tel: "5493516884422", fecha: "05/04", prio: "⭐⭐ INVERSOR", quote: "USD 45.000" },
            { cat: "Lote", zona: "Manantiales I", desc: "Lote central, buena ubicación.", nombre: "Matias Asesor", tel: "5493513334444", fecha: "03/04", prio: "⭐⭐ CALIFICADO", quote: "USD 85.000" },

            // COMERCIAL Y OTROS
            { cat: "Galpón", zona: "Zona Norte", desc: "600-1000 m2. Oficina y entrada camiones.", nombre: "G. Santa Fe", tel: "5493516629988", fecha: "13/04", prio: "⭐⭐⭐ EMPRESA", quote: "Sin Techo" },
            { cat: "Local", zona: "Recta Martinoli / Cerro", desc: "Para consultorios, con baño y cocina.", nombre: "Vanesa Docta", tel: "5493516508822", fecha: "01/04", prio: "⭐⭐ CALIFICADO", quote: "USD 90.000" },
            { cat: "Local Gastr.", zona: "Sierras Chicas", desc: "Alquiler de local para gastronomía.", nombre: "+54 9 351 228-9527", tel: "5493512289527", fecha: "08/04", prio: "⭐ ALQUILER", quote: "Consultar" },
            { cat: "Cochera", zona: "Nueva Córdoba", desc: "Compra 2 cocheras juntas o separadas. Edificio moderno.", nombre: "Andres R.", tel: "5493515551122", fecha: "07/04", prio: "⭐ INVERSOR", quote: "USD 15.000 c/u" }
        ];

        function renderCards(data) {
            const grid = document.getElementById('requestsGrid');
            const noRes = document.getElementById('noResults');
            grid.innerHTML = '';

            if (data.length === 0) {
                noRes.classList.remove('hidden');
                return;
            }
            noRes.classList.add('hidden');

            data.forEach(item => {
                let badgeClass = "bg-slate-100 text-slate-500 border-slate-200";
                if((item.prio || '').includes("⭐⭐⭐")) badgeClass = "bg-red-50 text-red-600 border-red-200";
                else if((item.prio || '').includes("⭐⭐")) badgeClass = "bg-blue-50 text-blue-600 border-blue-200";

                // Sanitizar teléfono para WhatsApp
                const phone = (item.tel || '').toString().replace(/[^0-9]/g, '');
                const hasPhone = phone.length >= 8;
                const waHref = hasPhone ? `https://wa.me/${phone}` : '#';
                const waAttrs = hasPhone ? 'target="_blank" rel="noopener noreferrer"' : 'aria-disabled="true"';
                const waClass = hasPhone
                    ? 'flex items-center gap-2 bg-green-500 text-white px-4 py-2.5 rounded-xl text-[10px] font-black hover:bg-green-600 transition-all shadow-md active:scale-95'
                    : 'flex items-center gap-2 bg-slate-200 text-slate-400 px-4 py-2.5 rounded-xl text-[10px] font-black wa-disabled';

                const card = document.createElement('div');
                card.className = "card-entry bg-white rounded-[2rem] p-6 border border-slate-200 flex flex-col cursor-default";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-5">
                        <span class="text-[9px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full border ${badgeClass}">${item.prio || ''}</span>
                        <span class="text-fecha text-slate-400 font-bold">${item.fecha || ''}</span>
                    </div>
                    
                    <div class="mb-4">
                        <h4 class="text-[10px] font-black text-red-600 uppercase tracking-tighter mb-1">${item.cat || ''}</h4>
                        <h3 class="text-xl font-bold text-slate-900 leading-tight">${item.zona || ''}</h3>
                    </div>
                    
                    <p class="text-pedido text-slate-600 mb-6 flex-1 italic">"${item.desc || ''}"</p>
                    
                    <div class="bg-slate-50 border border-slate-200 p-4 rounded-2xl mb-6">
                        <p class="text-xs font-black text-slate-900 uppercase tracking-wide">Ppto: ${item.quote || 'Consultar'}</p>
                    </div>
                    
                    <div class="flex items-center justify-between pt-4 border-t border-slate-100">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-[10px] shadow-lg">
                                RX
                            </div>
                            <div class="flex flex-col">
                                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">Solicitado por</span>
                                <span class="text-[12px] font-bold text-slate-800 truncate max-w-[130px]">${item.nombre || ''}</span>
                            </div>
                        </div>
                        <a href="${waHref}" ${waAttrs} class="${waClass}">
                            <i class="fab fa-whatsapp text-sm"></i> CHAT
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterCards() {
            const query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
            // Si la búsqueda es numérica intentamos buscar en presupuesto o teléfono
            const isNumeric = /\d/.test(query);
            const filtered = requests.filter(r => {
                const zona = (r.zona || '').toString().toLowerCase();
                const desc = (r.desc || '').toString().toLowerCase();
                const nombre = (r.nombre || '').toString().toLowerCase();
                const cat = (r.cat || '').toString().toLowerCase();
                const tel = (r.tel || '').toString().toLowerCase();
                const quote = (r.quote || '').toString().toLowerCase();
                if (isNumeric) {
                    // buscar por números en teléfono o presupuesto textual
                    return tel.includes(query) || quote.includes(query) || zona.includes(query) || desc.includes(query) || nombre.includes(query) || cat.includes(query);
                }
                return zona.includes(query) || desc.includes(query) || nombre.includes(query) || cat.includes(query);
            });
            renderCards(filtered);
        }

        function filterType(type, ev) {
            // quitar active de todos
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));

            // marcar el botón que disparó el evento (compatible)
            let btnEl = null;
            if (ev && ev.currentTarget) btnEl = ev.currentTarget;
            else if (ev && ev.target && ev.target.closest) btnEl = ev.target.closest('.filter-btn');
            else {
                const t = (type || '').toString().toUpperCase();
                btnEl = Array.from(document.querySelectorAll('.filter-btn')).find(b => b.textContent.trim().toUpperCase() === t);
            }
            if (btnEl) btnEl.classList.add('active');

            if ((type || '').toLowerCase() === 'todos' || !type) {
                renderCards(requests);
                return;
            }
            const filtered = requests.filter(r => (r.cat || '').toLowerCase().includes(type.toLowerCase()));
            renderCards(filtered);
        }

        window.onload = () => renderCards(requests);
    </script>
</body>
</html>
